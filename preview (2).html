<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f1a4f, #0a0a0a);
    color: white;
}

.githubBtn {
    position:fixed;
    top:10px;
    right:10px;
    padding:10px 15px;
    background:#1f2a5a;
    color:white;
    border-radius:10px;
    text-decoration:none;
}

.container {
    width:95%;
    max-width:800px;
    margin:auto;
    padding:20px 0;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:20px;
}

#results {
    max-height:60vh;
    overflow-y:auto;
    width:100%;
}

.result {
    display:flex;
    gap:12px;
    align-items:center;
    background:#1a1a1a;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}
.result:hover {background:#333;}

.result img {
    width:50px;
    height:50px;
    border-radius:8px;
}

.hidden {display:none;}

#detail {
    background: rgba(0,0,0,0.35);
    border-radius:20px;
    padding:20px;
}

.statCard {
    display:inline-block;
    background:#111c44;
    padding:12px 20px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    margin:10px;
}

#mutations {
    width:100%;
    background:#0f1a3a;
    padding:15px;
    border-radius:15px;
}

.mutationRow {
    display:flex;
    align-items:center;
    gap:10px;
    margin:12px 0;
}

.barContainer {
    flex:1;
    background:#1a254f;
    height:12px;
    border-radius:10px;
    overflow:hidden;
}

.bar {
    height:100%;
    border-radius:10px;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#444;
    color:white;
    margin:10px;
    cursor:pointer;
}
button:hover {background:#666;}
</style>
</head>

<body>

<a href="https://github.com/MiroTD/SABTracker/tree/main" target="_blank" class="githubBtn">View Updates</a>

<!-- HOME -->

</div>

<!-- DETAIL -->

<div id="stats"></div>

<div id="mutations"></div>
<button onclick="goHome()">Return</button>
</div>

<!-- ROLL -->
<div class="container hidden" id="roll">

<div id="rollResult"></div>
<button onclick="goHome()">Back</button>

{name:"Base", color:"white"},
{name:"Cyber", color:"cyan"},
{name:"Divine", color:"#fff4a3"},
{name:"Cursed", color:"darkred"},
{name:"Radioactive", color:"lime"},
{name:"YinYang", color:"linear-gradient(90deg, black 50%, white 50%)"},
{name:"Galaxy", color:"purple"},
{name:"Lava", color:"orange"},
{name:"Candy", color:"pink"},
{name:"Rainbow", color:"linear-gradient(90deg, red, orange, yellow, green, blue)"},
{name:"Gold", color:"gold"},
{name:"Diamond", color:"deepskyblue"}
];

function generateOver100Mutations(){
    let result = [];
    for(let m of mutationTypes){
        let value = Math.random() * 30;

        if(m.name === "Base") value += 30 + Math.random()*40;
        if(m.name === "Gold" || m.name === "Diamond") value += 20 + Math.random()*20;
        if(m.name === "Cyber") value += Math.random()*5;

        result.push({...m, percent: value});
    }
    return result;
}

/* SEARCH */
function searchItems(){
let q = search.value.toLowerCase();
results.innerHTML="";

data.filter(x=>x.name.toLowerCase().includes(q))
.forEach(item=>{
let div=document.createElement("div");
div.className="result";

div.innerHTML=`
<img src="${item.img}" onerror="this.src='${fallback}'">
<div>
<b>${item.name}</b><br>
<small>${item.cps} CPS/s • ${item.exists} Exists</small>
</div>
`;

div.onclick=()=>showDetail(item);
results.appendChild(div);
});
}

/* DETAIL */
function showDetail(item){
home.classList.add("hidden");
roll.classList.add("hidden");
textPage.classList.add("hidden");
detail.classList.remove("hidden");

detailImg.src=item.img;
title.innerText=item.name;

stats.innerHTML = `
<div class="statCard">CPS/s<br>${item.cps}</div>
<div class="statCard">Exists<br>${item.exists}</div>
<div class="statCard">Value<br>${item.value}</div>
`;

mutations.innerHTML="<h3>Mutations</h3>";

let m = generateOver100Mutations();

m.forEach(x=>{
let row=document.createElement("div");
row.className="mutationRow";

let label=document.createElement("span");
label.style.width="120px";
label.innerText=x.name;

let barWrap=document.createElement("div");
barWrap.className="barContainer";

let bar=document.createElement("div");
bar.className="bar";
bar.style.width=Math.min(x.percent,100)+"%";
bar.style.background=x.color;

let percent=document.createElement("span");
percent.style.marginLeft="10px";
percent.innerText=x.percent.toFixed(1)+"%";

barWrap.appendChild(bar);

row.appendChild(label);
row.appendChild(barWrap);
row.appendChild(percent);

mutations.appendChild(row);
});
}

function openRollPage(){
home.classList.add("hidden");
detail.classList.add("hidden");
textPage.classList.add("hidden");
roll.classList.remove("hidden");
}

function openTextPage(){
home.classList.add("hidden");
detail.classList.add("hidden");
roll.classList.add("hidden");
textPage.classList.remove("hidden");
}

function goHome(){
home.classList.remove("hidden");
detail.classList.add("hidden");
roll.classList.add("hidden");
textPage.classList.add("hidden");
}

function rollItem(){
let item = data[Math.floor(Math.random()*data.length)];

rollResult.innerHTML=`
<h2>${item.name}</h2>
<img src="${item.img}" style="width:120px;border-radius:10px;">
<p>${item.cps} CPS/s • ${item.exists} Exists</p>
<button onclick='showDetail(${JSON.stringify(item)})'>Open</button>
`;
}
