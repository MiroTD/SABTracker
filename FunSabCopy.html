<!DOCTYPE html>
<html>
<head>
  <title>Brainrot Collector 3D (Upgraded)</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
      z-index: 10;
    }
  </style>
</head>
<body>
<div id="ui">WASD to move | Press E to collect → send to plot</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
// ================= MODULE: Brainrots =================
const Brainrots = [
  { name: "FishBoard", CPS: 100, rarity: "Common", chance: 80, img: "https://static.wikia.nocookie.net/stealabr/images/d/da/Fishboard.png/revision/latest/scale-to-width-down/150?cb=20260301003229"},
  { name: "Bananaito", CPS: 500, rarity: "Rare", chance: 18, img: "https://static.wikia.nocookie.net/stealabr/images/7/7e/Bananito.png/revision/latest/scale-to-width-down/150?cb=20260417152109" },
  { name: "Cerberus", CPS: 20000, rarity: "Legendary", chance: 2, img: "https://static.wikia.nocookie.net/stealabr/images/4/45/Cerberus.png/revision/latest/scale-to-width-down/268?cb=20260217181804" },
  { name: "Dragon Canneloni", CPS: 150000, rarity: "Secret", chance: 0.0367, img"https://static.wikia.nocookie.net/stealabr/images/3/31/Nah_uh.png/revision/latest/scale-to-width-down/150?cb=20250919124457",}
];

// ================= SCENE =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= FLOOR =================
const floor = new THREE.Mesh(
  new THREE.BoxGeometry(60, 1, 60),
  new THREE.MeshBasicMaterial({ color: 0x00aa00 })
);
floor.position.y = -0.5;
scene.add(floor);

// ================= PATH (RED) =================
const path = new THREE.Mesh(
  new THREE.BoxGeometry(50, 0.1, 4),
  new THREE.MeshBasicMaterial({ color: 0xaa0000 })
);
path.position.set(0, 0.01, 0);
scene.add(path);

// ================= PLAYER =================
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshBasicMaterial({ color: 0x0000ff })
);
scene.add(player);

camera.position.set(0,5,10);

// ================= PLOT =================
const plot = new THREE.Mesh(
  new THREE.BoxGeometry(12, 0.2, 12),
  new THREE.MeshBasicMaterial({ color: 0x444444 })
);
plot.position.set(0, 0.1, -15);
scene.add(plot);

// slots
let slots = [];
for(let i=0;i<4;i++){
  let slot = new THREE.Mesh(
    new THREE.BoxGeometry(2,0.2,2),
    new THREE.MeshBasicMaterial({ color: 0x888888 })
  );
  slot.position.set(-4 + i*3, 0.2, -15);
  scene.add(slot);
  slots.push({mesh:slot, occupied:false});
}

// ================= MOVEMENT =================
const keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

function movePlayer() {
  if(keys['w']) player.position.z -= 0.15;
  if(keys['s']) player.position.z += 0.15;
  if(keys['a']) player.position.x -= 0.15;
  if(keys['d']) player.position.x += 0.15;
}

// ================= SAVE =================
let saved = JSON.parse(localStorage.getItem('brainrotSave') || "[]");
function save(){
  localStorage.setItem('brainrotSave', JSON.stringify(saved));
}

// ================= SPAWN =================
let npcs = [];
const loader = new THREE.TextureLoader();

function spawnBrainrot(){
  let rand = Math.random();
  let total = 0;

  for(let b of Brainrots){
    total += b.chance;
    if(rand <= total){

      let texture = loader.load(b.img);
      let mat = new THREE.MeshBasicMaterial({ map: texture });

      let npc = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mat);
      npc.userData = { ...b, state: "walking" };
      npc.position.set(-25,0.5,0);

      scene.add(npc);
      npcs.push(npc);
      break;
    }
  }
}

setInterval(spawnBrainrot, 3000);

// ================= NPC LOGIC =================
function moveNPCs(){
  npcs.forEach(npc => {

    if(npc.userData.state === "walking"){
      npc.position.x += 0.05;

      if(npc.position.x > 25){
        scene.remove(npc);
      }
    }

    if(npc.userData.state === "toPlot"){
      let target = npc.userData.targetSlot.mesh.position;

      npc.position.lerp(target, 0.05);

      if(npc.position.distanceTo(target) < 0.2){
        npc.userData.state = "placed";
        npc.userData.targetSlot.occupied = true;
      }
    }
  });
}

// ================= CLAIM =================
document.addEventListener('keydown', e => {
  if(e.key.toLowerCase() === 'e'){

    let nearest = null;
    let dist = 999;

    npcs.forEach(npc => {
      let d = player.position.distanceTo(npc.position);
      if(d < dist && npc.userData.state === "walking"){
        dist = d;
        nearest = npc;
      }
    });

    if(nearest && dist < 3){

      let freeSlot = slots.find(s => !s.occupied);
      if(!freeSlot) return;

      nearest.userData.state = "toPlot";
      nearest.userData.targetSlot = freeSlot;

      saved.push(nearest.userData);
      save();
    }
  }
});

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  movePlayer();
  moveNPCs();

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
