<!DOCTYPE html>
<html>
<head>
  <title>Duel FPS Polished</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin:0; overflow:hidden; background:#0a0a0a; font-family:Arial; color:white; }

    #menu, #hud, #end {
      position:absolute; width:100%; text-align:center;
    }

    #menu { top:30%; }
    button {
      padding:12px 20px;
      margin:8px;
      font-size:16px;
      background:#222;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
    button:hover { background:#444; }

    #hud { top:10px; display:none; font-size:18px; }

    #crosshair {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:22px;
      opacity:0.8;
    }

    #countdown {
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:72px;
      color:white;
    }

    #end { top:40%; display:none; font-size:32px; }
  </style>
</head>
<body>

<div id="menu">
  <h1>Duel FPS</h1>
  <button onclick="start('weak')">Weak</button>
  <button onclick="start('mid')">Mid</button>
  <button onclick="start('sweat')">Sweat</button>
</div>

<div id="hud">Round <span id="r">1</span> | You <span id="ps">0</span> Bot <span id="bs">0</span></div>
<div id="crosshair">+</div>
<div id="countdown"></div>
<div id="end"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
let scene,camera,renderer,bot,bullets=[];
let keys={},yaw=0,pitch=0,vy=0,onGround=true;
let diff='weak',round=1,ps=0,bs=0,can=false;
let playerPos = new THREE.Vector3(20,1,20);

function init(){
scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// floor
let floor=new THREE.Mesh(new THREE.BoxGeometry(80,1,80),new THREE.MeshStandardMaterial({color:0x1a1a1a}));
floor.position.y=-.5;scene.add(floor);

// light
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// platforms
for(let i=0;i<6;i++){
 let p=new THREE.Mesh(new THREE.BoxGeometry(4,1,4),new THREE.MeshStandardMaterial({color:0x333333}));
 p.position.set(-15+i*6,1,-5);
 scene.add(p);
}

// bot
bot=new THREE.Mesh(new THREE.BoxGeometry(1,2,1),new THREE.MeshStandardMaterial({color:0xff4444}));
bot.position.set(-20,1,-20);
scene.add(bot);

// better gun (still simple but nicer)
let gun = new THREE.Group();
let body = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.3,1.5), new THREE.MeshStandardMaterial({color:0x555555}));
let barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1), new THREE.MeshStandardMaterial({color:0x222222}));
barrel.rotation.x = Math.PI/2;
barrel.position.z = -1;

 gun.add(body);
 gun.add(barrel);
 gun.position.set(0.6,-0.6,-2);
 camera.add(gun);
 scene.add(camera);

camera.position.copy(playerPos).add(new THREE.Vector3(0,1,2));
document.body.requestPointerLock();
}

onkeydown=e=>keys[e.key.toLowerCase()]=1;
onkeyup=e=>keys[e.key.toLowerCase()]=0;

onmousemove=e=>{
 if(document.pointerLockElement){
  yaw-=e.movementX*0.002;
  pitch-=e.movementY*0.002;
  pitch=Math.max(-1.5,Math.min(1.5,pitch));
 }
};

function move(){
 if(!can) return;
 let speed=0.3;
 let f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 let r=new THREE.Vector3().crossVectors(f,new THREE.Vector3(0,1,0));

 if(keys['w']) playerPos.add(f.clone().multiplyScalar(-speed));
 if(keys['s']) playerPos.add(f.clone().multiplyScalar(speed));
 if(keys['a']) playerPos.add(r.clone().multiplyScalar(speed));
 if(keys['d']) playerPos.add(r.clone().multiplyScalar(-speed));

 if(keys[' ']&&onGround){vy=.4;onGround=false;}
 vy-=.02;playerPos.y+=vy;
 if(playerPos.y<=1){playerPos.y=1;vy=0;onGround=true;}

 camera.position.copy(playerPos).add(new THREE.Vector3(0,1,2));
 camera.rotation.set(pitch,yaw,0);

 // bot same speed + dodge
 let dir=new THREE.Vector3().subVectors(playerPos,bot.position).normalize();
 let side=new THREE.Vector3(-dir.z,0,dir.x);
 let dodge=Math.sin(Date.now()*0.006)*3;
 bot.position.add(dir.multiplyScalar(speed*0.8));
 bot.position.add(side.multiplyScalar(dodge*0.06));

 let chance=diff==='weak'?0.004:diff==='mid'?0.008:0.015;
 if(Math.random()<chance) shoot(bot,playerPos);
}

function shoot(from,to){
 let b=new THREE.Mesh(new THREE.SphereGeometry(.15),new THREE.MeshBasicMaterial({color:0xffff00}));
 b.position.copy(from.position);
 let d=new THREE.Vector3().subVectors(to,from.position).normalize();
 bullets.push({m:b,d});scene.add(b);
}

onclick=()=>{if(can) shoot(camera, bot.position)};

function bulletsUpdate(){
 bullets.forEach((b,i)=>{
  b.m.position.add(b.d.clone().multiplyScalar(1.5));
  if(b.m.position.distanceTo(bot.position)<1) end('player');
  if(b.m.position.distanceTo(playerPos)<1) end('bot');
  if(b.m.position.length()>120){scene.remove(b.m);bullets.splice(i,1);} 
 });
}

function end(w){
 can=false;
 if(w==='player')ps++; else bs++;
 if(round>=3){ endDiv.innerHTML=(ps>bs?'YOU WIN':'BOT WINS'); endDiv.style.display='block'; return; }
 round++; update(); reset(); count();
}

function reset(){ playerPos.set(20,1,20); bot.position.set(-20,1,-20); }
function update(){ r.innerText=round; psEl.innerText=ps; bsEl.innerText=bs; }

function start(d){ diff=d; menu.style.display='none'; hud.style.display='block'; init(); count(); loop(); }

function count(){
 let c=3; countdown.innerText=c;
 let t=setInterval(()=>{
  c--;
  if(c<=0){ clearInterval(t); countdown.innerText=''; can=true; }
  else countdown.innerText=c;
 },1000);
}

function loop(){ requestAnimationFrame(loop); move(); bulletsUpdate(); renderer.render(scene,camera); }

const menu=document.getElementById('menu');
const hud=document.getElementById('hud');
const r=document.getElementById('r');
const psEl=document.getElementById('ps');
const bsEl=document.getElementById('bs');
const countdown=document.getElementById('countdown');
const endDiv=document.getElementById('end');
</script>
</body>
</html>
